 "on":                                                                                                  
    push:                                                   
      paths:
        - 'data/parts_report_past.xlsx'                                                                  
        - 'data/parts_report_future.xlsx'                                                                
    workflow_dispatch:                                                                                   
                                                                                                         
  name: Build and Deploy Parts Dashboard                                                                 
   
  permissions:                                                                                           
    contents: write                                         

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
                                                                                                         
        - uses: actions/setup-python@v5
          with:                                                                                          
            python-version: '3.11'                          

        - run: pip install -r requirements.txt

        - run: python parts_dashboard.py

        - uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./                                                                              
            publish_branch: gh-pages
            include_files: index.html
