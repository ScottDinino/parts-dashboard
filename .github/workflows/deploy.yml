name: Deploy Dashboard
"on":
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  push:
    paths:
      - data/parts_report_past.xlsx
      - data/parts_report_future.xlsx
      - fetch_st_data.py
      - parts_dashboard.py
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch PO data from ServiceTitan
        run: python fetch_st_data.py
      - run: python parts_dashboard.py
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
