name: Deploy Dashboard
"on":
  workflow_dispatch:
  # GitHub's scheduler is best-effort and drops most runs: at "0 * * * *" this
  # actually fired every 1.5-3h, not hourly. Asking every 6 min means even a
  # heavily-dropped schedule lands often. 6 (not 5) keeps us at 10 builds/hour,
  # the soft limit for branch-based Pages deploys.
  schedule:
    - cron: "*/6 * * * *"
  push:
    paths:
      - fetch_st_data.py
      - parts_dashboard.py
permissions:
  contents: write
# One deploy at a time — overlapping runs would race on the gh-pages force-push.
concurrency:
  group: deploy-dashboard
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch PO data from ServiceTitan
        run: python fetch_st_data.py
        env:
          ST_TENANT_ID:     ${{ secrets.ST_TENANT_ID }}
          ST_CLIENT_ID:     ${{ secrets.ST_CLIENT_ID }}
          ST_CLIENT_SECRET: ${{ secrets.ST_CLIENT_SECRET }}
          ST_APP_KEY:       ${{ secrets.ST_APP_KEY }}
      - run: python parts_dashboard.py
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # Publish a single orphan commit instead of appending history —
          # at ~240 deploys/day the branch would otherwise grow without bound.
          force_orphan: true
